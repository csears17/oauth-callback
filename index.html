<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QuickBooks connected</title>
<style>
  body { font-family: system-ui, -apple-system, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; color: #222; }
  h1 { font-size: 1.5rem; }
  textarea { width: 100%; height: 90px; font-family: ui-monospace, Consolas, monospace; font-size: 13px; padding: 10px; box-sizing: border-box; }
  button { background: #2c7a4b; color: #fff; padding: 10px 18px; border: 0; border-radius: 6px; font-size: 16px; cursor: pointer; }
  .ok { color: #2c7a4b; font-weight: 600; margin-left: 10px; }
  .muted { color: #666; }
</style>
</head>
<body>
  <h1 id="title">✅ QuickBooks authorized</h1>
  <p id="msg">Copy the text below, return to your <strong>Add&nbsp;a&nbsp;Company</strong> page, paste it into
     <strong>Finish connecting</strong>, and submit.</p>
  <textarea id="blob" readonly aria-label="authorization code"></textarea>
  <p><button onclick="copyBlob()">Copy</button><span id="copied" class="ok"></span></p>
  <p class="muted">You can close this tab after copying.</p>
<script>
  var q = window.location.search.replace(/^\?/, "");
  var ta = document.getElementById("blob");
  if (q) {
    ta.value = q;
  } else {
    document.getElementById("title").textContent = "Nothing to copy";
    document.getElementById("msg").textContent =
      "No authorization data is in this URL. Start the connection again from your Add a Company page.";
  }
  function copyBlob() {
    ta.select();
    ta.setSelectionRange(0, 99999);
    try { document.execCommand("copy"); } catch (e) {}
    if (navigator.clipboard) { navigator.clipboard.writeText(ta.value).catch(function(){}); }
    document.getElementById("copied").textContent = "Copied!";
  }
</script>
</body>
</html>
