<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QuickBooks connected</title>
<style>
  body { font-family: system-ui, -apple-system, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; color: #222; }
  h1 { font-size: 1.5rem; }
  textarea { width: 100%; height: 80px; font-family: ui-monospace, Consolas, monospace; font-size: 13px; padding: 10px; box-sizing: border-box; }
  button { background: #2c7a4b; color: #fff; padding: 10px 18px; border: 0; border-radius: 6px; font-size: 16px; cursor: pointer; }
  a { color: #2c7a4b; }
  .ok { color: #2c7a4b; font-weight: 600; margin-left: 10px; }
  .muted { color: #666; }
  #manual { display: none; margin-top: 24px; }
</style>
</head>
<body>
  <h1 id="title">✅ QuickBooks authorized</h1>
  <p id="msg">Sending you back to the app…</p>

  <div id="manual">
    <p>If you weren't sent back automatically, copy the code below, return to your
       <strong>Add&nbsp;a&nbsp;Company</strong> page (<code>http://localhost:8000</code>),
       and paste it into <strong>Finish connecting</strong>.</p>
    <textarea id="blob" readonly aria-label="authorization code"></textarea>
    <p><button onclick="copyBlob()">Copy</button><span id="copied" class="ok"></span></p>
  </div>
<script>
  var search = window.location.search;
  var q = search.replace(/^\?/, "");
  var manual = document.getElementById("manual");
  if (q) {
    document.getElementById("blob").value = q;
    // Normal case: auto-forward the code to the local admin. Top-level navigation to
    // http://localhost is permitted even from an https page.
    setTimeout(function () {
      window.location.href = "http://localhost:8000/exchange" + search;
    }, 600);
    // If we're still here a couple seconds later, the hop was blocked — show the manual path.
    setTimeout(function () {
      document.getElementById("msg").textContent =
        "Almost done — finish in the app:";
      manual.style.display = "block";
    }, 2500);
  } else {
    document.getElementById("title").textContent = "Nothing to copy";
    document.getElementById("msg").textContent =
      "No authorization data is in this URL. Start the connection again from your Add a Company page.";
  }
  function copyBlob() {
    var ta = document.getElementById("blob");
    ta.select(); ta.setSelectionRange(0, 99999);
    try { document.execCommand("copy"); } catch (e) {}
    if (navigator.clipboard) { navigator.clipboard.writeText(ta.value).catch(function(){}); }
    document.getElementById("copied").textContent = "Copied!";
  }
</script>
</body>
</html>
